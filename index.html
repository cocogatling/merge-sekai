<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#444466" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Merge Sekai" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="pwa-icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="Asset/box.png" />
  <title>Project Sekai Farm Merge Grid</title>
  <style>
    :root {
      --viewport-w: 1536px;
      --viewport-h: 738px;
      --tile-w: 32px;
      --tile-h: 15px;
      --tile-img-h: 15px;
      --zoom: 5;
      --bg: #444466;
      --shadow: rgba(15, 34, 54, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    img {
      image-rendering: crisp-edges;
      image-rendering: pixelated;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .game-shell {
      display: grid;
      justify-items: center;
      gap: 10px;
    }

    .viewport {
      width: var(--viewport-w);
      height: var(--viewport-h);
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      background: transparent;
      box-shadow:
        0 30px 60px rgba(16, 30, 48, 0.25),
        inset 0 0 0 2px rgba(255, 255, 255, 0.35);
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    .version-line {
      color: rgba(255, 255, 255, 0.72);
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      text-align: center;
      user-select: none;
    }

    .viewport.is-panning {
      cursor: grabbing;
    }

    .iso-layer {
      position: absolute;
      inset: 0;
      transform-origin: 50% 50%;
      will-change: transform;
      contain: layout paint style;
    }

    .tile {
      position: absolute;
      width: var(--tile-w);
      height: var(--tile-img-h);
      background-image: var(--cube-image);
      background-size: 100% 100%;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      filter: drop-shadow(0 6px 6px var(--shadow));
    }

    .tile::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0;
      background: rgba(255, 255, 255, 0.28);
      clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
      transition: opacity 120ms ease;
    }

    .tile:hover::after {
      opacity: 1;
    }

    .tile.is-orthographic {
      border-radius: 2px;
      box-shadow: none;
      filter: drop-shadow(0 5px 5px rgba(15, 34, 54, 0.22));
    }

    .tile.is-orthographic::after {
      clip-path: none;
      border-radius: inherit;
    }

    .tile-lock {
      position: absolute;
      width: var(--tile-w);
      height: var(--tile-img-h);
      object-fit: contain;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      pointer-events: none;
      filter: drop-shadow(0 6px 6px rgba(15, 34, 54, 0.35));
    }

    .tile-lock.is-orthographic {
      object-fit: cover;
      opacity: 0.88;
      filter: drop-shadow(0 5px 5px rgba(15, 34, 54, 0.24));
    }

    .board-object {
      position: absolute;
      width: 24px;
      height: 23px;
      object-fit: contain;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      pointer-events: none;
      transform: translate(-50%, -100%);
      transform-origin: bottom center;
      filter: drop-shadow(0 6px 5px rgba(15, 34, 54, 0.35));
      color: transparent;
      font-size: 0;
    }

    .board-object.is-dragging {
      opacity: 0.35;
      cursor: grabbing;
    }

    .board-item.is-dragging {
      opacity: 0.35;
      cursor: grabbing;
    }

    .board-item {
      position: absolute;
      width: 24px;
      height: 23px;
      transform: translate(-50%, -100%);
      transform-origin: bottom center;
      pointer-events: none;
      cursor: grab;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    .board-item-hitbox {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 24px;
      height: 23px;
      transform: translateX(-50%) scale(var(--item-scale, 1));
      transform-origin: bottom center;
      pointer-events: auto;
      cursor: inherit;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      touch-action: none;
    }

    .board-item .board-object {
      left: 50%;
      right: auto;
      bottom: 0;
      top: auto;
      transform: translateX(-50%) scale(var(--item-scale, 1));
      transform-origin: bottom center;
    }

    .board-item.is-collectible {
      cursor: pointer;
    }

    .board-item.is-sleeping {
      cursor: default;
    }

    .board-item.is-centered {
      width: 32px;
      height: 32px;
      transform: translate(-50%, -50%);
      transform-origin: center;
    }

    .board-item.is-centered .board-item-hitbox {
      bottom: auto;
      top: 50%;
      width: 32px;
      height: 32px;
      transform: translate(-50%, -50%) scale(var(--item-scale, 1));
      transform-origin: center;
    }

    .board-item.is-centered .board-object {
      bottom: auto;
      top: 50%;
      width: 32px;
      height: 32px;
      transform: translate(-50%, -50%) scale(var(--item-scale, 1));
      transform-origin: center;
    }

    .timer-overlay {
      position: absolute;
      left: 50%;
      top: 70%;
      width: 5px;
      height: 5px;
      object-fit: contain;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .board-item.is-centered .timer-overlay {
      top: 155%;
      width: 12px;
      height: 12px;
      padding: 2px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 3px 7px rgba(15, 34, 54, 0.28);
      transform: translate(-50%, -50%) scale(calc(var(--item-scale, 1) * 0.48));
      transform-origin: center;
    }

    .character-reward-popup {
      position: absolute;
      left: 50%;
      top: calc(-2px * var(--item-scale, 1));
      width: 20px;
      height: 22px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(255, 255, 255, 0.92);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.96);
      transform: translate(-50%, -100%) scale(var(--item-scale, 1));
      transform-origin: bottom center;
      filter: drop-shadow(0 5px 5px rgba(15, 34, 54, 0.35));
      pointer-events: auto;
      cursor: pointer;
      animation: reward-hover 900ms ease-in-out infinite;
    }

    .character-reward-popup::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -8px;
      width: 0;
      height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 9px solid rgba(255, 255, 255, 0.96);
      transform: translateX(-50%);
    }

    .character-reward-popup img {
      width: 14px;
      height: 14px;
      object-fit: contain;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      position: relative;
      z-index: 1;
      pointer-events: none;
    }

    .board-item.is-centered .character-reward-popup {
      left: 50%;
      top: 0;
      width: 22px;
      height: 22px;
      border-width: 2px;
      border-radius: 999px;
      transform: translate(-50%, -108%) scale(calc(var(--item-scale, 1) * 0.56));
      transform-origin: bottom center;
      animation: reward-hover-centered 900ms ease-in-out infinite;
    }

    .board-item.is-centered .character-reward-popup::after {
      display: none;
    }

    .board-item.is-centered .character-reward-popup img {
      width: 16px;
      height: 16px;
    }

    @keyframes reward-hover {
      0%, 100% {
        transform: translate(-50%, -100%) scale(var(--item-scale, 1));
      }
      50% {
        transform: translate(-50%, -112%) scale(var(--item-scale, 1));
      }
    }

    @keyframes reward-hover-centered {
      0%, 100% {
        transform: translate(-50%, -108%) scale(calc(var(--item-scale, 1) * 0.56));
      }
      50% {
        transform: translate(-50%, -122%) scale(calc(var(--item-scale, 1) * 0.56));
      }
    }

    .drag-ghost {
      position: fixed;
      z-index: 1000;
      width: 24px;
      height: 23px;
      object-fit: contain;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(var(--ghost-scale, 1));
      transform-origin: center;
      filter: drop-shadow(0 12px 10px rgba(15, 34, 54, 0.42));
      color: transparent;
      font-size: 0;
    }

    .drag-ghost.is-orthographic {
      width: 32px;
      height: 32px;
    }

    .merge-flyer {
      position: absolute;
      width: 24px;
      height: 23px;
      object-fit: contain;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      pointer-events: none;
      transform: translate(-50%, -100%);
      transform-origin: bottom center;
      z-index: 900;
      filter: drop-shadow(0 6px 5px rgba(15, 34, 54, 0.35));
      animation: merge-fly 720ms cubic-bezier(0.16, 0.9, 0.25, 1) forwards;
    }

    .merge-burst {
      position: absolute;
      width: 3px;
      height: 3px;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 901;
      background: url("Asset/Sparkle.gif") center / contain no-repeat;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      animation: merge-burst 760ms ease-out forwards;
    }

    .board-item.is-merge-result {
      animation: merge-result-pop 460ms ease-out both;
    }

    .board-item.is-merge-consumed {
      opacity: 0;
    }

    .board-item.is-merge-preview {
      animation: merge-preview-pulse 760ms ease-in-out infinite;
      filter: drop-shadow(0 0 4px rgba(255, 96, 150, 0.85));
    }

    .merge-count-popup {
      position: fixed;
      z-index: 1105;
      min-width: 44px;
      height: 44px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.95);
      color: #ff6096;
      font-size: 26px;
      font-weight: 900;
      line-height: 44px;
      text-align: center;
      border: 4px solid rgba(255, 255, 255, 0.92);
      transform: translate(-50%, -108%);
      pointer-events: none;
      box-shadow: 0 5px 8px rgba(15, 34, 54, 0.3);
    }

    .lucky-merge-popup {
      position: fixed;
      z-index: 1110;
      color: #27e234;
      font-size: 34px;
      font-weight: 900;
      line-height: 0.88;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0.72);
      text-shadow:
        0 3px 0 #128d1c,
        0 -2px 0 #a8ff75,
        3px 0 0 #128d1c,
        -3px 0 0 #128d1c,
        0 8px 10px rgba(15, 34, 54, 0.42);
      animation: lucky-merge-pop 1250ms ease-out forwards;
    }

    @keyframes merge-fly {
      0% {
        transform: translate(-50%, -100%) scale(var(--merge-scale, 1));
        opacity: 1;
      }
      70% {
        transform: translate(calc(-50% + var(--merge-dx)), calc(-100% + var(--merge-dy) - 5px)) scale(calc(var(--merge-scale, 1) * 0.82));
        opacity: 1;
      }
      100% {
        transform: translate(calc(-50% + var(--merge-dx)), calc(-100% + var(--merge-dy))) scale(calc(var(--merge-scale, 1) * 0.35));
        opacity: 0;
      }
    }

    @keyframes merge-burst {
      0% {
        transform: translate(-50%, -50%) scale(0.72);
        opacity: 0;
      }
      28% {
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(1.8);
        opacity: 0;
      }
    }

    @keyframes merge-result-pop {
      0% {
        transform: translate(-50%, -100%) scale(0.82);
        filter: brightness(1.25) drop-shadow(0 6px 5px rgba(15, 34, 54, 0.35));
      }
      70% {
        transform: translate(-50%, -100%) scale(1.06);
      }
      100% {
        transform: translate(-50%, -100%) scale(1);
      }
    }

    @keyframes merge-preview-pulse {
      0%, 100% {
        transform: translate(-50%, -100%) scale(1);
      }
      50% {
        transform: translate(-50%, -104%) scale(1.08);
      }
    }

    @keyframes lucky-merge-pop {
      0% {
        opacity: 0;
        transform: translate(-50%, -40%) scale(0.56);
      }
      18% {
        opacity: 1;
        transform: translate(-50%, -70%) scale(1.08);
      }
      72% {
        opacity: 1;
        transform: translate(-50%, -82%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -112%) scale(0.92);
      }
    }

    .soft-fade {
      position: absolute;
      inset: 0;
      background: radial-gradient(900px 520px at 50% 42%, rgba(255, 255, 255, 0.16), transparent 72%);
      pointer-events: none;
    }

    .reset-button {
      position: absolute;
      right: 22px;
      bottom: 22px;
      z-index: 20;
      min-height: 34px;
      padding: 0 14px;
      border: 2px solid rgba(255, 255, 255, 0.78);
      border-radius: 7px;
      background: rgba(36, 36, 58, 0.78);
      color: #ff6096;
      font: inherit;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(15, 34, 54, 0.24);
    }

    .reset-button:hover {
      background: rgba(54, 54, 86, 0.9);
    }

    .zoom-controls {
      position: absolute;
      left: 22px;
      top: 72px;
      z-index: 20;
      display: flex;
      gap: 6px;
    }

    .flip-button,
    .projection-button {
      position: absolute;
      left: 22px;
      z-index: 20;
      min-height: 34px;
      padding: 0 14px;
      border: 2px solid rgba(255, 255, 255, 0.78);
      border-radius: 7px;
      background: rgba(36, 36, 58, 0.78);
      color: #ff6096;
      font: inherit;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(15, 34, 54, 0.24);
    }

    .flip-button {
      top: 118px;
    }

    .projection-button {
      top: 164px;
    }

    .flip-button:hover,
    .projection-button:hover {
      background: rgba(54, 54, 86, 0.9);
    }

    .reset-modal {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1200;
      background: rgba(14, 16, 28, 0.56);
      backdrop-filter: blur(6px);
      pointer-events: auto;
    }

    .reset-modal.is-open {
      display: flex;
    }

    .reset-modal-box {
      width: min(320px, calc(100% - 32px));
      padding: 18px;
      border: 2px solid rgba(255, 255, 255, 0.78);
      border-radius: 14px;
      background: rgba(36, 36, 58, 0.96);
      color: #fff;
      text-align: center;
      box-shadow: 0 16px 40px rgba(15, 34, 54, 0.36);
    }

    .reset-modal-title {
      color: #ff6096;
      font-size: 20px;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .reset-modal-text {
      margin-bottom: 16px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
      line-height: 1.35;
    }

    .reset-modal-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .reset-modal-actions button {
      min-width: 96px;
      min-height: 36px;
      padding: 0 14px;
      border: 2px solid rgba(255, 255, 255, 0.78);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    #confirmResetButton {
      color: #ff6096;
    }

    .zoom-button {
      width: 34px;
      height: 34px;
      border: 2px solid rgba(255, 255, 255, 0.78);
      border-radius: 7px;
      background: rgba(36, 36, 58, 0.78);
      color: #ff6096;
      font: inherit;
      font-size: 18px;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(15, 34, 54, 0.24);
    }

    .zoom-button:hover {
      background: rgba(54, 54, 86, 0.9);
    }

    .zoom-button:disabled {
      cursor: default;
      opacity: 0.5;
    }

    .xp-counter {
      position: absolute;
      left: 22px;
      top: 22px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(36, 36, 58, 0.78);
      color: #ff6096;
      font-size: 15px;
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 6px 14px rgba(15, 34, 54, 0.24);
      cursor: pointer;
      pointer-events: auto;
    }

    .xp-counter:hover {
      background: rgba(54, 54, 86, 0.9);
    }

    .xp-counter img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .xp-detail {
      position: absolute;
      left: calc(100% + 8px);
      top: 50%;
      min-width: 112px;
      padding: 8px 10px;
      border-radius: 7px;
      background: rgba(36, 36, 58, 0.92);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
      transform: translateY(-50%);
      box-shadow: 0 8px 18px rgba(15, 34, 54, 0.28);
    }

    .xp-detail[hidden] {
      display: none;
    }

    .xp-note-flyer {
      position: fixed;
      left: var(--xp-start-x);
      top: var(--xp-start-y);
      z-index: 1200;
      width: 22px;
      height: 22px;
      object-fit: contain;
      image-rendering: pixelated;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(1);
      filter: drop-shadow(0 5px 5px rgba(15, 34, 54, 0.35));
      animation: xp-note-fly 720ms cubic-bezier(0.16, 0.9, 0.25, 1) forwards;
    }

    @keyframes xp-note-fly {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      72% {
        transform:
          translate(
            calc(-50% + var(--xp-dx)),
            calc(-50% + var(--xp-dy) - 14px)
          )
          scale(0.92);
        opacity: 1;
      }
      100% {
        transform: translate(calc(-50% + var(--xp-dx)), calc(-50% + var(--xp-dy))) scale(0.58);
        opacity: 0;
      }
    }

    .spawner {
      position: absolute;
      left: 50%;
      bottom: 54px;
      z-index: 20;
      width: 82px;
      height: 82px;
      padding: 0;
      border: 0;
      background: transparent;
      transform: translateX(-50%);
      cursor: pointer;
      filter: drop-shadow(0 14px 10px rgba(15, 34, 54, 0.38));
    }

    .spawner-count {
      position: absolute;
      left: 50%;
      bottom: -6px;
      min-width: 72px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: #ff6096;
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
      text-align: center;
      transform: translateX(-50%);
      box-shadow: 0 4px 10px rgba(15, 34, 54, 0.22);
      pointer-events: none;
    }

    .spawner-timer {
      position: absolute;
      left: 50%;
      bottom: -32px;
      min-width: 86px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(36, 36, 58, 0.72);
      color: #ff6096;
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
      text-align: center;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .spawner.is-empty {
      cursor: not-allowed;
      opacity: 0.72;
    }

    .spawner img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      transition: transform 120ms ease;
    }

    .spawner:hover img {
      transform: translateY(-4px) scale(1.03);
    }

    .spawner:active img {
      transform: translateY(2px) scale(0.96);
    }

    .order-toggle {
      display: none;
      position: absolute;
      z-index: 24;
      width: 42px;
      height: 42px;
      padding: 0;
      border: 2px solid rgba(255, 255, 255, 0.78);
      border-radius: 9px;
      background: rgba(36, 36, 58, 0.82);
      color: #ff6096;
      font: inherit;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(15, 34, 54, 0.28);
    }

    .order-toggle-bar {
      display: block;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: #ff6096;
      box-shadow: 0 6px 0 #ff6096, 0 -6px 0 #ff6096;
    }

    .order-toggle.is-ready::after {
      content: "!";
      position: absolute;
      right: -5px;
      top: -7px;
      width: 17px;
      height: 17px;
      border: 2px solid #fff;
      border-radius: 999px;
      background: #ff1f3d;
      color: #fff;
      font-size: 12px;
      line-height: 16px;
      text-align: center;
    }

    .cooldown-popup {
      position: absolute;
      z-index: 60;
      min-width: 27px;
      padding: 2px 3px 3px;
      border: 2px solid rgba(255, 255, 255, 0.92);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.96);
      color: #ff6096;
      font-size: 5px;
      font-weight: 900;

    function clamp(value, min, max) {

    function isTouchViewport() {

    function isPortraitPhoneViewport() {
      return window.matchMedia("(orientation: portrait) and (max-width: 480px)").matches;

    function snapScreenPixel(value) {
      const ratio = window.devicePixelRatio || 1;
      return Math.round(value * ratio) / ratio;
    }

    function snapBoardPixel(value) {
      return Math.round(value);
    }

    function zoomSize(value) {
      return Math.round(value * boardZoom);
    }

    function getBoardMetrics() {
      if (isOrthographicBoard()) {
        const cellSize = zoomSize(32);

        return {
          mode: "orthographic",
          tileW: cellSize,
          tileH: cellSize,
          halfTileW: cellSize / 2,
          halfTileH: cellSize / 2,
          tileCenterX: cellSize / 2,
          tileCenterY: cellSize / 2,
          itemFootY: cellSize / 2
        };
      }

      return {
        mode: "isometric",
        tileW: zoomSize(tileW),
        tileH: zoomSize(tileImgH),
        halfTileW: zoomSize(halfTileW),
        halfTileH: zoomSize(halfTileH),
        tileCenterX: zoomSize(tileCenterX),
        tileCenterY: zoomSize(tileCenterY),
        itemFootY: zoomSize(itemFootY)
      };
    }

    function getZoomStep() {
      return isTouchViewport() ? mobileZoomStep : desktopZoomStep;
    }

    function normalizeBoardZoom(value) {
      const clamped = clamp(value, getMinZoom(), getMaxZoom());
      return Number(clamped.toFixed(2));
    }

    function getViewportLocalPoint(clientX, clientY) {
      const rect = viewport.getBoundingClientRect();
      return {
        x: clientX - rect.left,
        y: clientY - rect.top
      };
    }

    function getPanForZoom(oldZoom, newZoom, oldPanX, oldPanY, focalPoint) {
      const ratio = newZoom / oldZoom;
      const origin = {
        x: viewport.clientWidth / 2,
        y: viewport.clientHeight / 2
      };
      const unpannedPoint = {
        x: focalPoint.x - oldPanX,
        y: focalPoint.y - oldPanY
      };
      const zoomedPoint = {
        x: origin.x + (unpannedPoint.x - origin.x) * ratio,
        y: origin.y + (unpannedPoint.y - origin.y) * ratio
      };

      return {
        x: snapScreenPixel(clamp(focalPoint.x - zoomedPoint.x, -panLimit, panLimit)),
        y: snapScreenPixel(clamp(focalPoint.y - zoomedPoint.y, -panLimit, panLimit))
      };
    }

    function applyTransform(scale = 1, translateX = panX, translateY = panY) {
      const snappedX = snapScreenPixel(translateX);
      const snappedY = snapScreenPixel(translateY);
      iso.style.transform = scale === 1
        ? `translate(${snappedX}px, ${snappedY}px)`
        : `translate(${snappedX}px, ${snappedY}px) scale(${scale})`;
    }

    function cancelPendingTransform() {
      if (transformFrame !== null) {
        cancelAnimationFrame(transformFrame);
        transformFrame = null;
      }
      pendingTransform = null;
    }

    function updateTransform(scale = 1, translateX = panX, translateY = panY) {
      if (!isDiscordPortraitPhoneViewport() || (!isPanning && !isPinchingBoard)) {
        cancelPendingTransform();
        applyTransform(scale, translateX, translateY);
        return;
      }

      pendingTransform = { scale, translateX, translateY };
      if (transformFrame !== null) return;

      transformFrame = requestAnimationFrame(() => {
        transformFrame = null;
        if (!pendingTransform) return;
        applyTransform(pendingTransform.scale, pendingTransform.translateX, pendingTransform.translateY);
        pendingTransform = null;
      });
    }

    function updateZoomControls() {
      zoomOutButton.disabled = boardZoom <= getMinZoom();
      zoomInButton.disabled = boardZoom >= getMaxZoom();
    }

    function setBoardZoom(value, shouldSave = true, focalPoint = null) {
      const previousZoom = boardZoom;
      const nextZoom = normalizeBoardZoom(value);

      if (focalPoint && nextZoom !== previousZoom) {
        const nextPan = getPanForZoom(previousZoom, nextZoom, panX, panY, focalPoint);
        panX = nextPan.x;
        panY = nextPan.y;
      }

      boardZoom = nextZoom;
      updateZoomControls();
      buildGrid();
      if (shouldSave) saveGame();
    }

    function adjustBoardZoom(delta) {
      setBoardZoom(boardZoom + delta, true, {
        x: viewport.clientWidth / 2,
        y: viewport.clientHeight / 2
      });
    }

    function getBoardPointerPair() {
      return Array.from(activeBoardPointers.values()).slice(0, 2);
    }

    function getPointerPairDistance(pointerA, pointerB) {
      return Math.hypot(pointerB.clientX - pointerA.clientX, pointerB.clientY - pointerA.clientY);
    }

    function getPointerPairCenter(pointerA, pointerB) {
      return getViewportLocalPoint(
        (pointerA.clientX + pointerB.clientX) / 2,
        (pointerA.clientY + pointerB.clientY) / 2
      );
    }

    function beginBoardPinch() {
      const [pointerA, pointerB] = getBoardPointerPair();
      if (!pointerA || !pointerB) return;

      isPanning = false;
      hasPannedBoard = false;
      activePanPointerId = null;
      viewport.classList.remove("is-panning");

      isPinchingBoard = true;
      pinchStartDistance = Math.max(1, getPointerPairDistance(pointerA, pointerB));
      pinchStartZoom = boardZoom;
      pinchPreviewZoom = boardZoom;
      pinchStartPanX = panX;
      pinchStartPanY = panY;
      pinchStartCenter = getPointerPairCenter(pointerA, pointerB);
      pinchCurrentCenter = pinchStartCenter;
    }

    function updateBoardPinch() {
      if (!isPinchingBoard) return;

      const [pointerA, pointerB] = getBoardPointerPair();
      if (!pointerA || !pointerB) return;

      const distance = Math.max(1, getPointerPairDistance(pointerA, pointerB));
      pinchCurrentCenter = getPointerPairCenter(pointerA, pointerB);
      pinchPreviewZoom = clamp(pinchStartZoom * (distance / pinchStartDistance), getMinZoom(), getMaxZoom());

      const previewPan = getPanForZoom(
        pinchStartZoom,
        pinchPreviewZoom,
        pinchStartPanX,
        pinchStartPanY,
        pinchCurrentCenter
      );
      const previewScale = pinchPreviewZoom / pinchStartZoom;
      updateTransform(previewScale, previewPan.x, previewPan.y);
    }

    function finishBoardPinch(shouldSave = true) {
      if (!isPinchingBoard) return;

      const nextZoom = normalizeBoardZoom(pinchPreviewZoom);
      const nextPan = getPanForZoom(
        pinchStartZoom,
        nextZoom,
        pinchStartPanX,
        pinchStartPanY,
        pinchCurrentCenter
      );

      isPinchingBoard = false;
      panX = nextPan.x;
      panY = nextPan.y;
      boardZoom = nextZoom;
      cancelPendingTransform();
      updateZoomControls();
      buildGrid();
      if (shouldSave) saveGame();
    }

    function resetBoardPanGesture() {
      isPanning = false;
      hasPannedBoard = false;
      activePanPointerId = null;

    function getBoardDisplaySize() {
      if (isOrthographicBoard() && isPortraitPhoneViewport()) {

        cols: isBoardFlipped ? rows : cols
      };

    function getBoardDisplayPosition(x, y) {
      if (isOrthographicBoard() && isPortraitPhoneViewport()) {
        return { x, y };

      if (isOrthographicBoard() && isBoardFlipped) {
        return {
          x: rows - 1 - y,

      return isBoardFlipped

    function getBoardScreenPosition(x, y, originX, originY) {
      const display = getBoardDisplayPosition(x, y);
      const metrics = getBoardMetrics();

      if (metrics.mode === "orthographic") {
        return {
          x: snapBoardPixel(display.x * metrics.tileW + originX),
          y: snapBoardPixel(display.y * metrics.tileH + originY),
          z: display.y * getBoardDisplaySize().cols + display.x
        };
      }

      return {
        x: snapBoardPixel((display.x - display.y) * metrics.halfTileW + originX),
        y: snapBoardPixel((display.x + display.y) * metrics.halfTileH + originY),
        z: display.x + display.y
      };
    }

    function applySaveData(save) {

      panX = Number.isFinite(save.panX) ? clamp(save.panX, -panLimit, panLimit) : 0;

      isBoardFlipped = save.isBoardFlipped === true;
      boardProjection = save.boardProjection === "orthographic" ? "orthographic" : "isometric";
      playerXp = Number.isFinite(save.playerXp) ? save.playerXp : 0;
      playerLevel = Number.isFinite(save.playerLevel) ? Math.max(1, save.playerLevel) : getLevelForXp(playerXp);

      spawnedObjects.splice(

    async function loadGame() {

        if (localSave) {
          applySaveData(localSave);

    function restoreSpawnerItems() {
      if (spawnerItems >= maxSpawnerItems) {
        nextRestoreAt = null;
        updateSpawnerCount();
        updateSpawnerTimer();
        saveGame();
        return;
      }

      spawnerItems = Math.min(maxSpawnerItems, spawnerItems + restoreAmount);
      nextRestoreAt = spawnerItems >= maxSpawnerItems ? null : Date.now() + restoreDelayMs;
      updateSpawnerCount();
      updateSpawnerTimer();
      saveGame();
    }

    function applySpawnerRestoreCatchup() {
      if (spawnerItems >= maxSpawnerItems) {
        nextRestoreAt = null;
        updateSpawnerCount();
        updateSpawnerTimer();
        return;
      }

      if (nextRestoreAt === null) {
        nextRestoreAt = Date.now() + restoreDelayMs;
        updateSpawnerTimer();
        saveGame();
        return;
      }

      const now = Date.now();
      if (now < nextRestoreAt) return;

      const restoreCycles = Math.floor((now - nextRestoreAt) / restoreDelayMs) + 1;
      spawnerItems = Math.min(maxSpawnerItems, spawnerItems + restoreCycles * restoreAmount);
      nextRestoreAt = spawnerItems >= maxSpawnerItems
        ? null
        : nextRestoreAt + restoreCycles * restoreDelayMs;
      updateSpawnerCount();
      updateSpawnerTimer();
      saveGame();
    }

    function updateSpawnerTimer() {
      if (spawnerItems < maxSpawnerItems && nextRestoreAt !== null && Date.now() >= nextRestoreAt) {
        applySpawnerRestoreCatchup();
        return;
      }

      if (spawnerItems >= maxSpawnerItems || nextRestoreAt === null) {
        spawnerTimer.textContent = "5:00";
        spawnerTimer.hidden = true;
        return;
      }

      const remainingMs = Math.max(0, nextRestoreAt - Date.now());
      const totalSeconds = Math.ceil(remainingMs / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      spawnerTimer.textContent = `${minutes}:${String(seconds).padStart(2, "0")}`;
    }

    function getLevelForXp(xp) {
      return levelXpTable.reduce((currentLevel, levelInfo) =>
        xp >= levelInfo.xp ? levelInfo.level : currentLevel,
        1
      );
    }

    function getUnlockedBoardTileCount(level) {
      return boardUnlockLevels.reduce((total, row) =>
        total + row.filter((unlockLevel) => level >= unlockLevel).length,
        0
      );

      const unlockText = unlockedCharacters.length > 0
        ? `Unlocked ${unlockedCharacters.join(", ")}`
        : `+${spaceIncrease} board ${spaceIncrease === 1 ? "space" : "spaces"} unlocked`;

      popup.className = "level-up-popup";
      popup.innerHTML = `
        <h2>Level ${newLevel}</h2>

        <div class="crate-line">
          <img src="Asset/box.png" alt="" />
          <span>+${crateBonus} crates</span>
        </div>
      `;
      viewport.appendChild(popup);
      setTimeout(() => popup.remove(), 2850);
    }

    function showInstructionPopup() {
      const existingPopup = viewport.querySelector(".instruction-popup");
      if (existingPopup) existingPopup.remove();

      const popup = document.createElement("div");
      popup.className = "instruction-popup";
      popup.innerHTML = `
        <h2>How to Play</h2>
        <div class="instruction-chain" aria-label="Kanade merge chain">
          <img src="Asset/Kanade_1.png" alt="" />
          <span>&gt;</span>

        </div>
        <p class="instruction-objective">Objective: Reach lvl 10</p>
        <button class="instruction-close" type="button">Start</button>
      `;

      popup.addEventListener("pointerdown", (event) => {
        event.stopPropagation();

      popup.querySelector(".instruction-close").addEventListener("click", (event) => {
        event.stopPropagation();
