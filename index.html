    function applyLevelUnlocks() {
      const nextLevel = getLevelForXp(playerXp);
      if (nextLevel <= playerLevel) return;

      const previousLevel = playerLevel;
      const gainedLevels = nextLevel - playerLevel;
      playerLevel = nextLevel;
      spawnerItems += gainedLevels * levelUpSpawnerBonus;
      if (spawnerItems >= maxSpawnerItems) {
        nextRestoreAt = null;
      }
      updateSpawnerCount();
      updateSpawnerTimer();
      normalizeBoardObjects();
      buildGrid();
      showLevelUpPopup(
        nextLevel,
        characterConfigs
          .filter((config) => config.unlockLevel > previousLevel && config.unlockLevel <= nextLevel)
          .map((config) => config.finalName.replace(" 4", "")),
        gainedLevels * levelUpSpawnerBonus,
        getUnlockedBoardTileCount(nextLevel) - getUnlockedBoardTileCount(previousLevel)
      );
    }

    function getNextLevelXp() {
      const nextLevelInfo = levelXpTable.find((levelInfo) => levelInfo.level > playerLevel);
      return nextLevelInfo ? nextLevelInfo.xp : levelXpTable[levelXpTable.length - 1].xp;
    }

    function updateXpCount() {
      xpCount.textContent = `Lv ${playerLevel}`;
      xpDetail.textContent = `${playerXp}/${getNextLevelXp()} EXP`;
    }

    function updateRewardInventoryCount() {
      kanadeRewardInventoryCount.textContent = `${rewardInventory}`;
      mafuyuRewardInventoryCount.textContent = `${mafuyuRewardInventory}`;
      enaRewardInventoryCount.textContent = `${enaRewardInventory}`;
      mizukiRewardInventoryCount.textContent = `${mizukiRewardInventory}`;
      if (activeOrder) updateOrderPanel();
    }

    function formatDuration(ms) {
      const totalSeconds = Math.max(0, Math.ceil(ms / 1000));
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      if (hours > 0) {
        return `${hours}H ${minutes}M`;
      }

      return `${minutes}M ${String(seconds).padStart(2, "0")}S`;
    }

    function getCharacterConfig(objectOrFile) {
      const file = typeof objectOrFile === "string" ? objectOrFile : objectOrFile.file;
      return characterConfigs.find((config) =>
        file === config.finalFile ||
        file === config.sleepFile ||
        file === config.rewardFile ||
        file === config.finalRewardFile
      );
    }

    function isCharacterRewardFile(file) {
      return characterConfigs.some((config) => config.rewardFile === file);
    }

    function getRewardInventory(file) {
      if (file === "chr_il/chr_il_20.png") return mizukiRewardInventory;
      if (file === "chr_il/chr_il_19.png") return enaRewardInventory;
      if (file === "chr_il/chr_il_18.png") return mafuyuRewardInventory;
      return rewardInventory;
    }

    function setRewardInventory(file, value) {
      if (file === "chr_il/chr_il_20.png") {
        mizukiRewardInventory = value;
      } else if (file === "chr_il/chr_il_19.png") {
        enaRewardInventory = value;
      } else if (file === "chr_il/chr_il_18.png") {
        mafuyuRewardInventory = value;
      } else {
        rewardInventory = value;
      }
    }

    function getAvailableOrderCount(order) {
      if (!order) return 0;
      return getRewardInventory(order.file);
    }

    function isActiveOrderCompletable() {
      ensureActiveOrder();
      return getAvailableOrderCount(activeOrder) >= activeOrder.count;
    }

    function setOrderPanelOpen(isOpen) {
      isOrderPanelOpen = isOpen;
      orderPanel.classList.toggle("is-open", isOpen);
      orderToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
      orderToggle.setAttribute("aria-label", isOpen ? "Hide order" : "Show order");
    }

    function syncOrderDrawerState(isCompletable) {
      orderToggle.classList.toggle("is-ready", isCompletable);

      if (!isMobileOrderDrawer()) {
        setOrderPanelOpen(true);
        wasOrderCompletable = isCompletable;
        return;
      }

      if (isCompletable && !wasOrderCompletable) {
        setOrderPanelOpen(true);
      }

      wasOrderCompletable = isCompletable;
    }

    function getUnlockedCharacters() {
      return characterConfigs.filter((config) => config.unlockLevel <= playerLevel);
    }

    function createNextOrder() {
      const unlockedCharacters = getUnlockedCharacters();
      const config = unlockedCharacters[Math.floor(Math.random() * unlockedCharacters.length)] || characterConfigs[0];

      return {
        type: "reward",
        file: config.rewardFile,
        name: `${config.finalName.replace(" 4", "")} reward`,
        count: 1,
        rewardCrates: 5,
        rewardXp: 10
      };
    }

    function ensureActiveOrder() {
      const orderConfig = activeOrder && characterConfigs.find((config) => config.rewardFile === activeOrder.file);
      if (!orderConfig || orderConfig.unlockLevel > playerLevel) {
        activeOrder = createNextOrder();
        return;
      }

      activeOrder.name = `${orderConfig.finalName.replace(" 4", "")} reward`;
      activeOrder.count = 1;
      activeOrder.rewardCrates = 5;
      activeOrder.rewardXp = 10;
    }

    function updateOrderPanel() {
      ensureActiveOrder();
      const available = getAvailableOrderCount(activeOrder);
      orderIcon.src = `Asset/${activeOrder.file}`;
      orderText.textContent = `${activeOrder.name} ${Math.min(available, activeOrder.count)}/${activeOrder.count}`;
      orderReward.textContent = `+${activeOrder.rewardCrates} crates`;
      orderXpReward.textContent = `+${activeOrder.rewardXp || 0} EXP`;
      const isCompletable = available >= activeOrder.count;
      orderComplete.disabled = !isCompletable;
      syncOrderDrawerState(isCompletable);
    }

    function removeOrderItems(order) {
      setRewardInventory(order.file, getRewardInventory(order.file) - order.count);
      updateRewardInventoryCount();
    }

    function completeOrder() {
      ensureActiveOrder();
      if (getAvailableOrderCount(activeOrder) < activeOrder.count) return;

      removeOrderItems(activeOrder);
      spawnerItems += activeOrder.rewardCrates;
      addXp(activeOrder.rewardXp || 0);
      if (spawnerItems >= maxSpawnerItems) {
        nextRestoreAt = null;
      }
      activeOrder = createNextOrder();
      setOrderPanelOpen(false);
      wasOrderCompletable = false;
      updateSpawnerCount();
      updateSpawnerTimer();
      updateOrderPanel();
      saveGame();
      buildGrid();
    }

    function showSpaceWarning() {
      const existingWarning = viewport.querySelector(".space-warning");
      if (existingWarning) existingWarning.remove();

      const warning = document.createElement("div");
      warning.className = "space-warning";
      warning.textContent = "Need more empty space!";
      viewport.appendChild(warning);
      setTimeout(() => warning.remove(), 1550);
    }

    function refreshSleepingCharacterItems() {
      if (isPanning || isPinchingBoard || draggedObject) return;

      const now = Date.now();
      let changed = false;

      spawnedObjects.forEach((object) => {
        const config = getCharacterConfig(object);
        if (!config || object.file !== config.sleepFile || object.readyAt === null) return;
        if (now < object.readyAt) return;

        object.readyAt = null;
        changed = true;
      });

      if (refreshFinalCharacterRewards()) {
        changed = true;
      }

      if (changed) {
        saveGame();
        buildGrid();
      }
    }

    function refreshFinalCharacterRewards() {
      let changed = false;
      spawnedObjects.forEach((object) => {
        const config = getCharacterConfig(object);
        const hasUncollectedRewards = config && spawnedObjects.some((item) => item.file === config.rewardFile);
        if (config && object.file === config.sleepFile && object.finalRewardPending && !hasUncollectedRewards) {
          object.file = config.finalFile;
          object.name = config.finalName;
          object.readyAt = null;
          object.finalRewardPending = false;
          object.finalRewardReady = true;
          changed = true;
        }
      });

      return changed;
    }

    function getAvailableRewardTiles(origin, count) {
      return getNearestEmptyTiles(origin, count);
    }

    function getRandomSpawnItem() {
      const unlockedSpawnTable = spawnTable.filter((item) => item.unlockLevel <= playerLevel);
      const totalChance = unlockedSpawnTable.reduce((sum, item) => sum + item.chance, 0);
      const roll = Math.random() * totalChance;
      let cursor = 0;

      for (const item of unlockedSpawnTable) {
        cursor += item.chance;
        if (roll < cursor) return item;
      }

      return unlockedSpawnTable[0];
    }

    function isBoardTile(x, y) {
      return (
        x >= 0 &&
        x < cols &&
        y >= 0 &&
        y < rows &&
        boardShape[y][x] === "X"
      );
    }

    function isBoardTileUnlocked(x, y) {
      return isBoardTile(x, y) && playerLevel >= boardUnlockLevels[y][x];
    }

    function isPlaceableTile(x, y) {
      return isBoardTileUnlocked(x, y);
    }

    function normalizeBoardObjects() {
      const occupiedTiles = new Set();

      for (let index = spawnedObjects.length - 1; index >= 0; index -= 1) {
        const object = spawnedObjects[index];
        const currentTileKey = `${object.x},${object.y}`;

        if (isPlaceableTile(object.x, object.y) && !occupiedTiles.has(currentTileKey)) {
          occupiedTiles.add(currentTileKey);
          continue;
        }

        const emptyTiles = [];
        for (let y = 0; y < rows; y += 1) {
          for (let x = 0; x < cols; x += 1) {
            const tileKey = `${x},${y}`;
            if (!isPlaceableTile(x, y) || occupiedTiles.has(tileKey)) continue;

            emptyTiles.push({
              x,
              y,
              distance: Math.abs(x - object.x) + Math.abs(y - object.y),
              visualDistance: Math.hypot(x - object.x, y - object.y)
            });
          }
        }

        if (emptyTiles.length === 0) {
          spawnedObjects.splice(index, 1);
          continue;
        }

        emptyTiles.sort((a, b) =>
          a.distance - b.distance ||
          a.visualDistance - b.visualDistance ||
          a.y - b.y ||
          a.x - b.x
        );

        object.x = emptyTiles[0].x;
        object.y = emptyTiles[0].y;
        occupiedTiles.add(`${object.x},${object.y}`);
      }
    }

    function isBoardTileAvailable(x, y, ignoreId = null) {
      return (
        isPlaceableTile(x, y) &&
        !getObjectAtTile(x, y, ignoreId)
      );
    }

    function getRandomEmptyTile() {
      const emptyTiles = [];
      const centerX = (cols - 1) / 2;
      const centerY = (rows - 1) / 2;

      for (let y = 0; y < rows; y += 1) {
        for (let x = 0; x < cols; x += 1) {
          if (isBoardTileAvailable(x, y)) {
            emptyTiles.push({
              x,
              y,
              distance: Math.hypot(x - centerX, y - centerY)
            });
          }
        }
      }

      if (emptyTiles.length === 0) return null;

      emptyTiles.sort((a, b) => a.distance - b.distance);
      const candidateCount = Math.min(emptyTiles.length, Math.max(4, Math.ceil(emptyTiles.length * 0.28)));
      const candidate = emptyTiles[Math.floor(Math.random() * candidateCount)];
      return { x: candidate.x, y: candidate.y };
    }

    function getNearbyEmptyTile(origin) {
      const nearbyOffsets = [
        { x: 1, y: 0 },
        { x: -1, y: 0 },
        { x: 0, y: 1 },
        { x: 0, y: -1 },
        { x: 1, y: 1 },
        { x: -1, y: -1 },
        { x: 1, y: -1 },
        { x: -1, y: 1 }
      ];

      for (const offset of nearbyOffsets) {
        const x = origin.x + offset.x;
        const y = origin.y + offset.y;
        if (isBoardTileAvailable(x, y)) {
          return { x, y };
        }
      }

      return getRandomEmptyTile();
    }

    function getNearestEmptyTiles(origin, count) {
      const emptyTiles = [];

      for (let y = 0; y < rows; y += 1) {
        for (let x = 0; x < cols; x += 1) {
          if (!isBoardTileAvailable(x, y)) continue;

          emptyTiles.push({
            x,
            y,
            distance: Math.abs(x - origin.x) + Math.abs(y - origin.y),
            visualDistance: Math.hypot(x - origin.x, y - origin.y)
          });
        }
      }

      emptyTiles.sort((a, b) =>
        a.distance - b.distance ||
        a.visualDistance - b.visualDistance ||
        a.y - b.y ||
        a.x - b.x
      );

      return emptyTiles.slice(0, count).map(({ x, y }) => ({ x, y }));
    }

    function spawnRandomObject() {
      const tile = getRandomEmptyTile();
      if (!tile) return false;

      const item = getRandomSpawnItem();
      spawnedObjects.push({
        id: nextObjectId,
        file: item.file,
        name: item.name,
        x: tile.x,
        y: tile.y
      });
      nextObjectId += 1;
      updateOrderPanel();
      saveGame();
      buildGrid();
      return true;
    }

    function addBoardObject(file, name, x, y) {
      const object = {
        id: nextObjectId,
        file,
        name,
        x,
        y
      };

      if (characterConfigs.some((config) => config.finalFile === file)) {
        object.harvests = 0;
        object.readyAt = null;
      }

      spawnedObjects.push(object);
      nextObjectId += 1;
      updateOrderPanel();
      return object;
    }

    function getObjectAtTile(x, y, ignoreId = null) {
      return spawnedObjects.find((object) =>
        object.id !== ignoreId && object.x === x && object.y === y
      );
    }

    function getOrthogonalNeighbors(object, file, ignoredIds = new Set()) {
      const orthogonalOffsets = [
        { x: 1, y: 0 },
        { x: -1, y: 0 },
        { x: 0, y: 1 },
        { x: 0, y: -1 }
      ];

      return orthogonalOffsets
        .map((offset) => getObjectAtTile(object.x + offset.x, object.y + offset.y))
        .filter((neighbor) =>
          neighbor &&
          neighbor.file === file &&
          !ignoredIds.has(neighbor.id)
        );
    }

    function getOrthogonalCluster(start, file, ignoredIds = new Set()) {
      const cluster = [];
      const visited = new Set([...ignoredIds, start.id]);
      const queue = [start];

      while (queue.length > 0) {
        const current = queue.shift();
        cluster.push(current);

        getOrthogonalNeighbors(current, file, visited).forEach((neighbor) => {
          visited.add(neighbor.id);
          queue.push(neighbor);
        });
      }

      return cluster;
    }

    function getBoardAnchor(object) {
      const screen = getBoardScreenPosition(object.x, object.y, lastOriginX, lastOriginY);
      const metrics = getBoardMetrics();

      return {
        x: screen.x + metrics.tileCenterX,
        y: screen.y + metrics.itemFootY
      };
    }

    function playMergeAnimation(merging, resultTiles) {
      if (lastOriginX === 0 && lastOriginY === 0) return;

      const target = getBoardAnchor(resultTiles[0]);

      merging.forEach((object, index) => {
        const source = getBoardAnchor(object);
        const flyer = document.createElement("img");

        flyer.className = "merge-flyer";
        flyer.src = `Asset/${object.file}`;
        flyer.alt = "";
        flyer.style.left = `${source.x}px`;
        flyer.style.top = `${source.y}px`;
        flyer.style.setProperty("--merge-dx", `${target.x - source.x}px`);
        flyer.style.setProperty("--merge-dy", `${target.y - source.y}px`);
        flyer.style.setProperty("--merge-scale", getRenderedItemScale(object.file));
        flyer.style.animationDelay = `${index * 40}ms`;

        iso.appendChild(flyer);
        setTimeout(() => flyer.remove(), 940);
      });

      setTimeout(() => {
        resultTiles.slice(0, 2).forEach((tile) => {
          const anchor = getBoardAnchor(tile);
          const burst = document.createElement("div");

          burst.className = "merge-burst";
          burst.style.left = `${anchor.x}px`;
          burst.style.top = `${anchor.y}px`;
          iso.appendChild(burst);
          setTimeout(() => burst.remove(), 900);
        });
      }, 440);
    }

    function getMergeRecipe(totalMergeCount) {
      const mergeRecipes = {
        3: { groups: [3], currentResults: 0 },
        4: { groups: [4], currentResults: 1 },
        5: { groups: [5], currentResults: 0 },
        6: { groups: [3, 3], currentResults: 0 },
        7: { groups: [3, 4], currentResults: 1 },
        8: { groups: [5, 3], currentResults: 0 },
        9: { groups: [3, 3, 3], currentResults: 0 },
        10: { groups: [5, 5], currentResults: 0 }
      };

      if (mergeRecipes[totalMergeCount]) return mergeRecipes[totalMergeCount];
      if (totalMergeCount < 3) return null;

      const bestRecipes = Array(totalMergeCount + 1).fill(null);
      bestRecipes[0] = { groups: [], currentResults: 0, nextResults: 0 };

      for (let count = 1; count <= totalMergeCount; count += 1) {
        [3, 5].forEach((group) => {
          const previous = bestRecipes[count - group];
          if (!previous) return;

          const candidate = {
            groups: [...previous.groups, group],
            currentResults: 0,
            nextResults: previous.nextResults + (group === 5 ? 2 : 1)
          };
          const current = bestRecipes[count];
          if (
            !current ||
            candidate.nextResults > current.nextResults ||
            (
              candidate.nextResults === current.nextResults &&
              candidate.groups.length < current.groups.length
            )
          ) {
            bestRecipes[count] = candidate;
          }
        });
      }

      const recipe = bestRecipes[totalMergeCount];
      return recipe
        ? { groups: recipe.groups, currentResults: 0 }
        : null;
    }

    function getDropMergePlan(dragged, target) {
      if (!target || dragged.file !== target.file) return null;
      const result = mergeChain[dragged.file];
      if (!result) return null;

      const ignoredIds = new Set([dragged.id]);
      const cluster = getOrthogonalCluster(target, dragged.file, ignoredIds);
      const totalMergeCount = cluster.length + 1;
      const recipe = getMergeRecipe(totalMergeCount);
      if (!recipe) return null;

      const consumedChain = cluster.slice(0, totalMergeCount - 1);
      const nextResultCount = recipe.groups.reduce((sum, group) => sum + (group === 5 ? 2 : 1), 0);
      const results = [
        ...Array.from({ length: nextResultCount }, () => result),
        ...Array.from({ length: recipe.currentResults }, () => ({ file: dragged.file, name: dragged.name }))
      ];

      if (consumedChain.length < 2) return null;

      return {
        result,
        results,
        mergeGroups: recipe.groups,
        nextResultCount,
        isBonusMerge: totalMergeCount === 5,
        resultCount: results.length,
        mergeCount: totalMergeCount,
        consumedChain
      };
    }

    function clearMergeHoverPreview() {
      mergePreviewIds.forEach((id) => {
        const element = iso.querySelector(`.board-item[data-id="${id}"]`);
        if (element) element.classList.remove("is-merge-preview");
      });
      mergePreviewIds.clear();
      if (mergeCountPopup) {
        mergeCountPopup.remove();
        mergeCountPopup = null;
      }
    }

    function updateMergeHoverPreview(event) {
      clearMergeHoverPreview();
      if (!draggedObject || !didDragMove) return;

      const targetTile = findNearestTile(event.clientX, event.clientY);
      if (!targetTile) return;

      const dragged = spawnedObjects.find((item) => item.id === draggedObject.id);
      const target = getObjectAtTile(targetTile.x, targetTile.y, draggedObject.id);
      const plan = dragged && target ? getDropMergePlan(dragged, target) : null;
      if (!plan) return;

      plan.consumedChain.forEach((object) => {
        mergePreviewIds.add(object.id);
        const element = iso.querySelector(`.board-item[data-id="${object.id}"]`);
        if (element) element.classList.add("is-merge-preview");
      });

      const targetPoint = getViewportPointFromBoardAnchor(getBoardAnchor(target));
      mergeCountPopup = document.createElement("div");
      mergeCountPopup.className = "merge-count-popup";
      mergeCountPopup.textContent = `${plan.mergeCount}`;
      mergeCountPopup.style.left = `${targetPoint.x}px`;
      mergeCountPopup.style.top = `${targetPoint.y}px`;
      document.body.appendChild(mergeCountPopup);
    }

    function getMergeItemLevel(file) {
      const match = file.match(/_(\d+)\.png$/);
      return match ? Number(match[1]) : null;
    }

    function getItemVisualScale(file) {
      const level = getMergeItemLevel(file);
      if (isOrthographicBoard()) {
        if (isCharacterRewardFile(file)) return 0.75;
        if (level === 1) return 0.62;
        if (level === 2) return 0.76;
        if (level === 3) return 0.88;
        return 1;
      }

      if (level === 1) return 0.4;
      if (level === 2) return 0.6;
      if (level === 3) return 0.8;
      return 1;
    }

    function getRenderedItemScale(file) {
      return getItemVisualScale(file) * boardZoom;
    }

    function getMergeXp(file, mergeCount) {
      const level = getMergeItemLevel(file);
      return mergeXpTable[mergeCount]?.[level] || 0;
    }

    function getMergePlanXp(file, plan) {
      return plan.mergeGroups.reduce((sum, mergeCount) => sum + getMergeXp(file, mergeCount), 0);
    }

    function rollLuckyMergeResults(plan) {
      const luckyResults = [];

      for (let index = 0; index < plan.nextResultCount; index += 1) {
        if (Math.random() < luckyMergeChance) {
          luckyResults.push(plan.result);
        }
      }

      return luckyResults;
    }

    function showLuckyMergePopup(originTile) {
      if (!originTile) return;

      const point = getViewportPointFromBoardAnchor(getBoardAnchor(originTile));
      const popup = document.createElement("div");
      popup.className = "lucky-merge-popup";
      popup.innerHTML = "Lucky<br>Merge!";
      popup.style.left = `${point.x}px`;
      popup.style.top = `${point.y}px`;
      document.body.appendChild(popup);
      setTimeout(() => popup.remove(), 1350);
    }

    function getViewportPointFromBoardAnchor(anchor) {
      const viewportRect = viewport.getBoundingClientRect();

      return {
        x: viewportRect.left + anchor.x + panX,
        y: viewportRect.top + anchor.y + panY
      };
    }

    function playXpNoteFlyer(originTile, index = 0) {
      if (!originTile) return;

      const source = getViewportPointFromBoardAnchor(getBoardAnchor(originTile));
      const targetRect = xpCount.parentElement.getBoundingClientRect();
      const target = {
        x: targetRect.left + targetRect.width / 2,
        y: targetRect.top + targetRect.height / 2
      };
      const flyer = document.createElement("img");

      flyer.className = "xp-note-flyer";
      flyer.src = "Asset/EXP_Note.png";
      flyer.alt = "";
      flyer.style.setProperty("--xp-start-x", `${source.x}px`);
      flyer.style.setProperty("--xp-start-y", `${source.y}px`);
      flyer.style.setProperty("--xp-dx", `${target.x - source.x}px`);
      flyer.style.setProperty("--xp-dy", `${target.y - source.y}px`);
      flyer.style.animationDelay = `${index * 85}ms`;
      document.body.appendChild(flyer);
      setTimeout(() => flyer.remove(), 760 + index * 85);
    }

    function playXpNoteFlyers(originTile, count) {
      for (let index = 0; index < count; index += 1) {
        playXpNoteFlyer(originTile, index);
      }
    }

    function addXp(amount, originTile = null, noteCount = 1) {
      if (amount <= 0) return;
      playXpNoteFlyers(originTile, noteCount);
      playerXp += amount;
      applyLevelUnlocks();
      updateXpCount();
    }

    function resolveDropMerge(dragged, target) {
      const plan = getDropMergePlan(dragged, target);
      if (!plan) return false;

      const luckyResults = rollLuckyMergeResults(plan);
      const results = [...plan.results, ...luckyResults];
      const resultCount = results.length;
      const { consumedChain } = plan;
      const merging = [dragged, ...consumedChain];
      const mergingIds = new Set(merging.map((item) => item.id));
      const resultTiles = consumedChain.slice(0, resultCount);

      clearMergeHoverPreview();
      mergingIds.forEach((id) => {
        const element = iso.querySelector(`.board-item[data-id="${id}"]`);
        if (element) element.classList.add("is-merge-consumed");
      });

      playMergeAnimation(merging, resultTiles);

      for (let index = spawnedObjects.length - 1; index >= 0; index -= 1) {
        if (mergingIds.has(spawnedObjects[index].id)) {
          spawnedObjects.splice(index, 1);
        }
      }

      resultTiles.forEach((tile, index) => {
        const output = results[index];
        const resultObject = addBoardObject(output.file, output.name, tile.x, tile.y);
        resultObject.justMerged = true;
      });
      if (luckyResults.length > 0) {
        showLuckyMergePopup(resultTiles[0]);
      }
      addXp(getMergePlanXp(dragged.file, plan), resultTiles[0], getMergeItemLevel(dragged.file) || 1);
      saveGame();
      return true;
    }

    function collectCharacterReward(object) {
      const config = getCharacterConfig(object);
      if (!config || (object.file !== config.finalFile && object.file !== config.sleepFile)) return false;
      const index = spawnedObjects.findIndex((item) => item.id === object.id);
      if (index === -1) return false;
      const current = spawnedObjects[index];

      if (current.finalRewardReady) {
        const origin = { x: current.x, y: current.y };
        const pendingRewardCount = current.pendingFinalRewardCount || 2;
        const rewardTiles = getAvailableRewardTiles(origin, pendingRewardCount);

        if (rewardTiles.length === 0) {
          showSpaceWarning();
          return false;
        }

        rewardTiles.forEach((tile) => {
          const resultObject = addBoardObject(config.finalRewardFile, config.finalRewardName, tile.x, tile.y);
          resultObject.justMerged = true;
        });

        current.pendingFinalRewardCount = pendingRewardCount - rewardTiles.length;
        if (current.pendingFinalRewardCount <= 0) {
          spawnedObjects.splice(index, 1);
        }

        saveGame();
        buildGrid();
        return true;
      }

      if (current.file === config.sleepFile && Date.now() < current.readyAt) {
        return false;
      }

      const pendingRewardCount = current.pendingHarvestRewardCount || Math.floor(Math.random() * 5) + 1;
      const rewardTiles = getAvailableRewardTiles(current, pendingRewardCount);

      if (rewardTiles.length === 0) {
        current.pendingHarvestRewardCount = pendingRewardCount;
        showSpaceWarning();
        saveGame();
        return false;
      }

      rewardTiles.forEach((tile) => {
        addBoardObject(config.rewardFile, config.harvestRewardName, tile.x, tile.y);
      });

      current.pendingHarvestRewardCount = pendingRewardCount - rewardTiles.length;
      if (current.pendingHarvestRewardCount > 0) {
        saveGame();
        buildGrid();
        return true;
      }

      delete current.pendingHarvestRewardCount;
      current.harvests = (current.harvests || 0) + 1;
      current.file = config.sleepFile;
      current.name = `${config.finalName} Sleep`;
      current.readyAt = Date.now() + characterSleepDelayMs;
      current.finalRewardPending = current.harvests >= 2;
      refreshFinalCharacterRewards();

      saveGame();
      buildGrid();
      return true;
    }

    function collectBoardRewards(file) {
      const matchingRewards = spawnedObjects.filter((object) => object.file === file);
      if (matchingRewards.length === 0) return false;

      for (let index = spawnedObjects.length - 1; index >= 0; index -= 1) {
        if (spawnedObjects[index].file === file) {
          spawnedObjects.splice(index, 1);
        }
      }

      if (file === "chr_il/chr_il_20.png") {
        mizukiRewardInventory += matchingRewards.length;
      } else if (file === "chr_il/chr_il_19.png") {
        enaRewardInventory += matchingRewards.length;
      } else if (file === "chr_il/chr_il_18.png") {
        mafuyuRewardInventory += matchingRewards.length;
      } else {
        rewardInventory += matchingRewards.length;
      }
      refreshFinalCharacterRewards();
      updateRewardInventoryCount();
      saveGame();
      buildGrid();
      return true;
    }

    function showCooldownPopup(object, originX, originY) {
      const existing = viewport.querySelector(".cooldown-popup");
      if (existing) existing.remove();
      if (cooldownPopupTimeout) {
        clearTimeout(cooldownPopupTimeout);
      }

      const screen = getBoardScreenPosition(object.x, object.y, originX, originY);
      const metrics = getBoardMetrics();
      const popup = document.createElement("div");
      const remaining = object.readyAt - Date.now();
      const overlayX = screen.x + metrics.tileCenterX + panX;
      const overlayY = screen.y + metrics.itemFootY + panY;

      popup.className = "cooldown-popup";
      popup.style.left = `${overlayX}px`;
      popup.style.top = `${overlayY}px`;
      popup.innerHTML = `
        <div class="time-row">
          <img src="Asset/timer.png" alt="" />
          <span>${formatDuration(remaining)}</span>
        </div>
      `;

      viewport.appendChild(popup);
      cooldownPopupTimeout = setTimeout(() => popup.remove(), 1800);
    }

    function findNearestTile(clientX, clientY) {
      let nearest = null;
      let nearestDistance = Infinity;
      const metrics = getBoardMetrics();
      const maxDistance = Math.max(metrics.tileW, metrics.tileH) * 0.72;
      const viewportRect = viewport.getBoundingClientRect();

      tilePlacementPoints.forEach((tile) => {
        if (!isPlaceableTile(tile.x, tile.y)) return;

        const centerX = viewportRect.left + tile.placementX + panX;
        const centerY = viewportRect.top + tile.placementY + panY;
        const distance = Math.hypot(clientX - centerX, clientY - centerY);

        if (distance < nearestDistance) {
          nearestDistance = distance;
          nearest = {
            x: tile.x,
            y: tile.y
          };
        }
      });

      if (nearestDistance > maxDistance) return null;
      return nearest;
    }

    function isTileOccupied(x, y, ignoreId) {
      return Boolean(getObjectAtTile(x, y, ignoreId));
    }

    function findNearestOrthogonalEmptyTile(origin) {
      const directions = [
        { x: 1, y: 0 },
        { x: -1, y: 0 },
        { x: 0, y: 1 },
        { x: 0, y: -1 }
      ];
      const visited = new Set([`${origin.x},${origin.y}`]);
      const queue = [{ x: origin.x, y: origin.y, distance: 0 }];

      while (queue.length > 0) {
        const current = queue.shift();

        for (const direction of directions) {
          const x = current.x + direction.x;
          const y = current.y + direction.y;
          const tileKey = `${x},${y}`;

          if (visited.has(tileKey) || !isPlaceableTile(x, y)) continue;
          if (isBoardTileAvailable(x, y)) return { x, y };

          visited.add(tileKey);
          queue.push({ x, y, distance: current.distance + 1 });
        }
      }

      return null;
    }

    function moveIntoOccupiedTile(dragged, target) {
      const draggedOrigin = { x: dragged.x, y: dragged.y };
      const targetOrigin = { x: target.x, y: target.y };
      const emptyTile = findNearestOrthogonalEmptyTile(target);

      if (emptyTile) {
        target.x = emptyTile.x;
        target.y = emptyTile.y;
      } else {
        target.x = draggedOrigin.x;
        target.y = draggedOrigin.y;
      }

      dragged.x = targetOrigin.x;
      dragged.y = targetOrigin.y;
    }

    function moveDragGhost(clientX, clientY) {
      if (!dragGhost) return;
      dragGhost.style.left = `${clientX}px`;
      dragGhost.style.top = `${clientY}px`;
    }

    function removeDragGhosts() {
      document.querySelectorAll(".drag-ghost").forEach((ghost) => ghost.remove());
      dragGhost = null;
    }

    function cleanupObjectDragListeners() {
      window.removeEventListener("pointermove", handleObjectDragMove);
      window.removeEventListener("pointerup", handleObjectDragEnd);
      window.removeEventListener("pointercancel", handleObjectDragCancel);
      window.removeEventListener("blur", cancelObjectDrag);
      document.removeEventListener("visibilitychange", handleDragVisibilityChange);
      if (activeDragHitbox) {
        activeDragHitbox.removeEventListener("lostpointercapture", handleObjectDragCancel);
      }
      if (activeDragHitbox && activeDragPointerId !== null && activeDragHitbox.hasPointerCapture?.(activeDragPointerId)) {
        activeDragHitbox.releasePointerCapture(activeDragPointerId);
      }
      activeDragHitbox = null;
      activeDragPointerId = null;
    }

    function cancelObjectDrag() {
      if (!draggedObject && !dragGhost) return;
      cleanupObjectDragListeners();
      clearMergeHoverPreview();
      removeDragGhosts();
      draggedObject = null;
      didDragMove = false;
      buildGrid();
    }

    function handleDragVisibilityChange() {
      if (document.hidden) cancelObjectDrag();
    }

    function refreshViewportLayout() {
      boardZoom = normalizeBoardZoom(boardZoom);
      updateZoomControls();
      buildGrid();
      if (isMobileOrderDrawer() && !isActiveOrderCompletable()) {
        setOrderPanelOpen(false);
      }
      updateOrderPanel();
    }

    function scheduleViewportLayoutRefresh() {
      if (resizeRefreshTimeout) clearTimeout(resizeRefreshTimeout);
      resizeRefreshTimeout = setTimeout(() => {
        resizeRefreshTimeout = null;
        if (isPanning || isPinchingBoard || draggedObject) {
          scheduleViewportLayoutRefresh();
          return;
        }
        refreshViewportLayout();
      }, isDiscordPortraitPhoneViewport() ? 180 : 60);
    }

    function endObjectDrag(event) {
      if (!draggedObject) return;

      const movedObject = draggedObject;
      const targetTile = findNearestTile(event.clientX, event.clientY);
      const object = spawnedObjects.find((item) => item.id === movedObject.id);
      let merged = false;

      if (targetTile && object && didDragMove) {
        const targetObject = getObjectAtTile(targetTile.x, targetTile.y, object.id);

        if (targetObject) {
          merged = resolveDropMerge(object, targetObject);
          if (!merged) {
            moveIntoOccupiedTile(object, targetObject);
            saveGame();
          }
        } else {
          object.x = targetTile.x;
          object.y = targetTile.y;
          saveGame();
        }
      }

      removeDragGhosts();

      draggedObject = null;
      if (merged) {
        setTimeout(buildGrid, 820);
      } else {
        buildGrid();
      }

      const movedConfig = getCharacterConfig(movedObject);
      if (!didDragMove && movedConfig && (movedObject.file === movedConfig.finalFile || movedObject.file === movedConfig.sleepFile)) {
        if (movedObject.file === movedConfig.finalFile || isSleepingCharacterReady(movedObject)) {
          collectCharacterReward(movedObject);
        } else {
          showCooldownPopup(movedObject, lastOriginX, lastOriginY);
        }
      }
    }

    function startObjectDrag(event, object) {
      event.preventDefault();
      event.stopPropagation();
      cancelObjectDrag();

      draggedObject = object;
      activeDragPointerId = event.pointerId;
      activeDragHitbox = event.currentTarget;
      dragStartClientX = event.clientX;
      dragStartClientY = event.clientY;
      didDragMove = false;
      event.currentTarget.closest(".board-item")?.classList.add("is-dragging");
      if (event.pointerId !== undefined) {
        event.currentTarget.setPointerCapture?.(event.pointerId);
      }
      event.currentTarget.addEventListener("lostpointercapture", handleObjectDragCancel);

      dragGhost = document.createElement("img");
      dragGhost.className = "drag-ghost";
      dragGhost.classList.toggle("is-orthographic", isOrthographicBoard());
      preloadAsset(object.file);
      dragGhost.src = getAssetUrl(object.file);
      dragGhost.alt = "";
      dragGhost.draggable = false;
      dragGhost.style.setProperty("--ghost-scale", getRenderedItemScale(object.file));
      document.body.appendChild(dragGhost);
      moveDragGhost(event.clientX, event.clientY);

      window.addEventListener("pointermove", handleObjectDragMove);
      window.addEventListener("pointerup", handleObjectDragEnd);
      window.addEventListener("pointercancel", handleObjectDragCancel);
      window.addEventListener("blur", cancelObjectDrag);
      document.addEventListener("visibilitychange", handleDragVisibilityChange);
    }

    function handleObjectDragMove(event) {
      if (!draggedObject || event.pointerId !== activeDragPointerId) return;
      if (Math.hypot(event.clientX - dragStartClientX, event.clientY - dragStartClientY) > 4) {
        didDragMove = true;
      }
      moveDragGhost(event.clientX, event.clientY);
      updateMergeHoverPreview(event);
    }

    function handleObjectDragEnd(event) {
      if (event.pointerId !== activeDragPointerId) return;
      cleanupObjectDragListeners();
      clearMergeHoverPreview();
      endObjectDrag(event);
    }

    function handleObjectDragCancel(event) {
      if (event.pointerId !== undefined && event.pointerId !== activeDragPointerId) return;
      cancelObjectDrag();
    }

    function isSleepingCharacterReady(object) {
      const config = getCharacterConfig(object);
      return Boolean(config && object.file === config.sleepFile && Date.now() >= object.readyAt);
    }

    function isCollectibleCharacter(object) {
      const config = getCharacterConfig(object);
      return Boolean(config && (object.finalRewardReady || object.file === config.finalFile || isSleepingCharacterReady(object)));
    }

    function renderSpawnedObjects(originX, originY) {
      const metrics = getBoardMetrics();
      spawnedObjects.forEach((object) => {
        const screen = getBoardScreenPosition(object.x, object.y, originX, originY);
        const wrapper = document.createElement("div");
        const hitbox = document.createElement("div");
        const img = document.createElement("img");

        wrapper.className = "board-item";
        wrapper.dataset.id = `${object.id}`;
        const characterConfig = getCharacterConfig(object);
        wrapper.classList.toggle("is-centered", metrics.mode === "orthographic");
        wrapper.classList.toggle("is-collectible", isCollectibleCharacter(object));
        wrapper.classList.toggle("is-merge-result", object.justMerged === true);
        wrapper.classList.toggle(
          "is-sleeping",
          characterConfig && object.file === characterConfig.sleepFile && !isSleepingCharacterReady(object)
        );
        wrapper.style.left = `${screen.x + metrics.tileCenterX}px`;
        wrapper.style.top = `${screen.y + metrics.itemFootY}px`;
        wrapper.style.zIndex = `${screen.z + 100}`;
        wrapper.style.setProperty("--item-scale", getRenderedItemScale(object.file));

        hitbox.className = "board-item-hitbox";

        img.className = "board-object";
        preloadAsset(object.file);
        img.src = getAssetUrl(object.file);
        img.alt = "";
        img.draggable = false;
        img.dataset.id = `${object.id}`;
        img.dataset.x = `${object.x}`;
        img.dataset.y = `${object.y}`;

        hitbox.addEventListener("click", (event) => {
          event.stopPropagation();
          if (isCharacterRewardFile(object.file)) {
            collectBoardRewards(object.file);
            return;
          }
          if (characterConfig && (object.file === characterConfig.finalFile || object.file === characterConfig.sleepFile)) return;
        });
        hitbox.addEventListener("pointerdown", (event) => {
          if (isCharacterRewardFile(object.file)) {
            event.preventDefault();
            event.stopPropagation();
            collectBoardRewards(object.file);
            return;
          }
          startObjectDrag(event, object);
        });

        wrapper.appendChild(hitbox);
        wrapper.appendChild(img);

        if (characterConfig && object.file === characterConfig.sleepFile && !isSleepingCharacterReady(object)) {
          const timer = document.createElement("img");
          timer.className = "timer-overlay";
          timer.src = "Asset/timer.png";
          timer.alt = "";
          wrapper.appendChild(timer);
        }

        if (isCollectibleCharacter(object)) {
          const reward = document.createElement("div");
          const rewardIcon = document.createElement("img");
          reward.className = "character-reward-popup";
          rewardIcon.src = `Asset/${object.finalRewardReady ? characterConfig.finalRewardFile : characterConfig.rewardFile}`;
          rewardIcon.alt = "";
          reward.addEventListener("pointerdown", (event) => {
            event.preventDefault();
            event.stopPropagation();
            collectCharacterReward(object);
          });
          reward.appendChild(rewardIcon);
          wrapper.appendChild(reward);
        }

        iso.appendChild(wrapper);
        if (object.justMerged === true) {
          object.justMerged = false;
        }
      });
    }

    function buildGrid() {
      cancelPendingTransform();
      iso.innerHTML = "";
      tilePlacementPoints = [];

      const viewportW = viewport.clientWidth;
      const viewportH = viewport.clientHeight;
      const displaySize = getBoardDisplaySize();
      const metrics = getBoardMetrics();
      const isOrthographic = metrics.mode === "orthographic";
      const minX = isOrthographic ? 0 : (0 - (displaySize.rows - 1)) * metrics.halfTileW;
      const maxX = isOrthographic ? (displaySize.cols - 1) * metrics.tileW : ((displaySize.cols - 1) - 0) * metrics.halfTileW;
      const minY = 0;
      const maxY = isOrthographic ? (displaySize.rows - 1) * metrics.tileH : ((displaySize.cols - 1) + (displaySize.rows - 1)) * metrics.halfTileH;
      const visualMinX = minX;
      const visualMaxX = maxX + metrics.tileW;
      const visualMinY = minY;
      const visualMaxY = maxY + metrics.tileH;
      const originX = Math.round(viewportW / 2 - (visualMinX + visualMaxX) / 2);
      const originY = Math.round(viewportH / 2 - (visualMinY + visualMaxY) / 2);
      lastOriginX = originX;
      lastOriginY = originY;

      applyTransform();

      for (let y = 0; y < rows; y += 1) {
        for (let x = 0; x < cols; x += 1) {
          if (!isBoardTile(x, y)) continue;

          const screen = getBoardScreenPosition(x, y, originX, originY);
          const placementX = screen.x + metrics.tileCenterX;
          const placementY = screen.y + metrics.tileCenterY;
          const tile = document.createElement("div");
          const isUnlocked = isBoardTileUnlocked(x, y);

          tile.className = "tile";
          tile.classList.toggle("is-orthographic", isOrthographic);
          tile.dataset.x = `${x}`;
          tile.dataset.y = `${y}`;
          tile.dataset.tile = (x + y) % 2 === 0 ? "black" : "white";
          tile.style.setProperty(
            "--cube-image",
            `url("Asset/${tile.dataset.tile === "black" ? "Black_Tile" : "White_Tile"}${isOrthographic ? "_Ortho" : ""}.png")`
          );
          tile.style.width = `${metrics.tileW}px`;
          tile.style.height = `${metrics.tileH}px`;
          tile.style.left = `${screen.x}px`;
          tile.style.top = `${screen.y}px`;
          tile.style.zIndex = `${screen.z}`;
          tile.title = isUnlocked
            ? `Tile ${x + 1}, ${y + 1}`
            : `Unlocks at Lv ${boardUnlockLevels[y][x]}`;
          tilePlacementPoints.push({
            x,
            y,
            placementX,
            placementY
          });

          iso.appendChild(tile);

          if (!isUnlocked) {
            const lock = document.createElement("img");
            lock.className = "tile-lock";
            lock.classList.toggle("is-orthographic", isOrthographic);
            lock.src = `Asset/Cloud_Lock${isOrthographic ? "_Ortho" : ""}.png`;
            lock.alt = "";
            lock.style.width = `${metrics.tileW}px`;
            lock.style.height = `${metrics.tileH}px`;
            lock.style.left = `${screen.x}px`;
            lock.style.top = `${screen.y}px`;
            lock.style.zIndex = `${screen.z + 60}`;
            iso.appendChild(lock);
          }
        }
      }

      renderSpawnedObjects(originX, originY);
    }

    viewport.addEventListener("pointerdown", (event) => {
      if (event.button !== 0) return;
      if (draggedObject || event.target.closest(".board-item-hitbox")) return;

      activeBoardPointers.set(event.pointerId, {
        clientX: event.clientX,
        clientY: event.clientY,
        pointerType: event.pointerType
      });
      startPointerX = event.clientX;
      startPointerY = event.clientY;
      startPanX = panX;
      startPanY = panY;
      viewport.setPointerCapture(event.pointerId);

      if (activeBoardPointers.size >= 2) {
        beginBoardPinch();
        return;
      }

      isPanning = true;
      hasPannedBoard = false;
      activePanPointerId = event.pointerId;
    });

    viewport.addEventListener("pointermove", (event) => {
      if (!activeBoardPointers.has(event.pointerId)) return;

      activeBoardPointers.set(event.pointerId, {
        clientX: event.clientX,
        clientY: event.clientY,
        pointerType: event.pointerType
      });

      if (activeBoardPointers.size >= 2) {
        if (!isPinchingBoard) beginBoardPinch();
        updateBoardPinch();
        return;
      }

      if (!isPanning || event.pointerId !== activePanPointerId) return;

      const deltaX = event.clientX - startPointerX;
      const deltaY = event.clientY - startPointerY;
      const panDeadzone = event.pointerType === "touch" ? touchPanDeadzone : mousePanDeadzone;

      if (!hasPannedBoard) {
        if (Math.hypot(deltaX, deltaY) < panDeadzone) return;
        hasPannedBoard = true;
        startPointerX = event.clientX;
        startPointerY = event.clientY;
        startPanX = panX;
        startPanY = panY;
        viewport.classList.add("is-panning");
        return;
      }

      panX = snapScreenPixel(clamp(startPanX + deltaX, -panLimit, panLimit));
      panY = snapScreenPixel(clamp(startPanY + deltaY, -panLimit, panLimit));
      updateTransform();
    });

    viewport.addEventListener("pointerup", (event) => {
      const shouldSavePan = hasPannedBoard;
      activeBoardPointers.delete(event.pointerId);

      if (viewport.hasPointerCapture(event.pointerId)) {
        viewport.releasePointerCapture(event.pointerId);
      }

      if (isPinchingBoard) {
        finishBoardPinch(true);
        resetBoardPanGesture();
        return;
      }

      resetBoardPanGesture();
      if (shouldSavePan) saveGame();
    });

    viewport.addEventListener("pointercancel", (event) => {
      activeBoardPointers.delete(event.pointerId);
      if (isPinchingBoard) {
        finishBoardPinch(false);
      }
      resetBoardPanGesture();
    });

    async function startGame() {
      preloadGameAssets();

      await loadGame();
      normalizeBoardObjects();
      refreshFinalCharacterRewards();
      ensureActiveOrder();
      applySpawnerRestoreCatchup();
      buildGrid();
      updateSpawnerCount();
      updateSpawnerTimer();
      updateXpCount();
      updateZoomControls();
      updateFlipButton();
      updateProjectionButton();
      updateRewardInventoryCount();
      updateOrderPanel();
      saveGame();
      setInterval(applySpawnerRestoreCatchup, 1000);
      setInterval(updateSpawnerTimer, 1000);
      setInterval(refreshSleepingCharacterItems, 1000);
      window.addEventListener("focus", applySpawnerRestoreCatchup);
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) applySpawnerRestoreCatchup();
      });
      window.addEventListener("resize", scheduleViewportLayoutRefresh);
      window.visualViewport?.addEventListener("resize", scheduleViewportLayoutRefresh);

      if ("serviceWorker" in navigator && window.isSecureContext) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch((error) => {
            console.warn("Could not register service worker.", error);
          });
        });
      }
    }

    startGame();
  </script>
</body>
</html>
